version: '3.8'

services:
  archiver:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.archiver
    ports:
      - "4000:4000"
      - "49737:49737"
      - "49737:49737/udp"
    volumes:
      - archiver-data:/app/archiver/data
      - content-data:/data
      - ${ARCHIVE_CONFIG:-/dev/null}:/app/archiver/archive-config.override.json:ro
    environment:
      - PORT=4000
      - DHT_PORT=49737
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_API_KEY=${MEILI_API_KEY:-}
      - DOMAIN=${DOMAIN:-localhost}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - WHISPER_CPP_PATH=/usr/local/bin/whisper-cpp
      - WHISPER_MODEL_PATH=/models/ggml-base.en-q5_1.bin
      - WHISPER_THREADS=${WHISPER_THREADS:-8}
    depends_on:
      - meilisearch
      - clamav
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        SITE_CONFIG: ${SITE_CONFIG:-}
    ports:
      - "3000:3000"
    environment:
      - ARCHIVER_URL=http://archiver:4000
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - archiver
    restart: unless-stopped
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_API_KEY:-changeme}
      - MEILI_NO_ANALYTICS=true
    restart: unless-stopped
    networks:
      - internal

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - content-data:/data
      - archiver-data:/app/archiver/data
    ports:
      - "51413:51413"
      - "51413:51413/udp"
    restart: unless-stopped
    networks:
      - internal

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav-data:/var/lib/clamav
    restart: unless-stopped
    networks:
      - internal

  crawler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.crawler
      args:
        SEEDS_FILE: ${SEEDS_FILE:-sites/epstein/seeds.json}
    volumes:
      - content-data:/data
      - archiver-data:/app/archiver/data
      - crawler-data:/app/crawler/data
    environment:
      - DOCS_DB_PATH=/app/archiver/data/documents.db
      - CRAWL_DB_PATH=/app/crawler/data/crawl.db
      - CONTENT_DIR=/data/content
      - THUMB_DIR=/data/thumbnails
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_API_KEY=${MEILI_API_KEY:-}
      - DOMAIN=${DOMAIN:-localhost}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - COURTLISTENER_TOKEN=${COURTLISTENER_TOKEN:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
    depends_on:
      - meilisearch
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - archiver
    restart: unless-stopped
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  archiver-data:
  content-data:
  meili-data:
  clamav-data:
  crawler-data:

networks:
  internal:
