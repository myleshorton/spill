worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=search:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # Docker DNS resolver — re-resolve dynamically so container
    # restarts don't leave nginx pointing at a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP — redirect to HTTPS (+ ACME challenges)
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — primary site (Epstein Files)
    server {
        listen 443 ssl http2;
        server_name unredact.org www.unredact.org;

        ssl_certificate /etc/letsencrypt/live/unredact.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/unredact.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes — proxy to archiver
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $archiver_backend http://archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streaming support for large documents
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # File uploads
        location /api/upload {
            limit_req zone=upload burst=2 nodelay;
            client_max_body_size 512M;
            set $archiver_backend http://archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
        }

        # Torrent downloads
        location ~ ^/api/datasets/\d+/torrent$ {
            limit_req zone=api burst=5 nodelay;
            set $archiver_backend http://archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Search — tighter rate limit
        location /api/documents/search {
            limit_req zone=search burst=10 nodelay;
            set $archiver_backend http://archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Document content — long cache, streaming
        location ~ ^/api/documents/.+/(content|thumbnail) {
            limit_req zone=api burst=30 nodelay;
            set $archiver_backend http://archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 600s;

            # Cache thumbnails aggressively
            add_header Cache-Control "public, max-age=604800";
        }

        # Frontend — Next.js
        location / {
            set $frontend_backend http://frontend:3000;
            proxy_pass $frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets — long cache
        location /_next/static/ {
            set $frontend_backend http://frontend:3000;
            proxy_pass $frontend_backend;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # HTTPS — Iran Uncensored
    server {
        listen 443 ssl http2;
        server_name iran.unredact.org;

        # Use the same wildcard/SAN cert, or a separate cert for the subdomain.
        # For now, fall back to the primary cert (works if it covers *.unredact.org
        # or if certbot has issued a cert for iran.unredact.org).
        ssl_certificate /etc/letsencrypt/live/unredact.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/unredact.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes — proxy to Iran archiver
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $archiver_backend http://iran-archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # File uploads — larger limit for video
        location /api/upload {
            limit_req zone=upload burst=2 nodelay;
            client_max_body_size 2048M;
            set $archiver_backend http://iran-archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
        }

        # Torrent downloads
        location ~ ^/api/datasets/\d+/torrent$ {
            limit_req zone=api burst=5 nodelay;
            set $archiver_backend http://iran-archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Search
        location /api/documents/search {
            limit_req zone=search burst=10 nodelay;
            set $archiver_backend http://iran-archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Document content — long cache, streaming
        location ~ ^/api/documents/.+/(content|thumbnail) {
            limit_req zone=api burst=30 nodelay;
            set $archiver_backend http://iran-archiver:4000;
            proxy_pass $archiver_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 600s;

            add_header Cache-Control "public, max-age=604800";
        }

        # Frontend — Iran Next.js
        location / {
            set $frontend_backend http://iran-frontend:3000;
            proxy_pass $frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets — long cache
        location /_next/static/ {
            set $frontend_backend http://iran-frontend:3000;
            proxy_pass $frontend_backend;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
